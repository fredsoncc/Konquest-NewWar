name: Compilador de APK Android

on:
  push:
    branches: [ "main", "master" ]  # Dispara a compilação sempre que houver atualização nas ramificações principais
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar o Codigo
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Dar permissao de execucao ao Gradle
      run: chmod +x gradlew

    - name: Compilar APK (Modo de Teste / Debug)
      run: ./gradlew assembleDebug

    - name: Disponibilizar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: konquest-app-debug
        path: '**/build/outputs/apk/**/*.apk'  # Encontra o APK automaticamente em qualquer subpasta de compilação
